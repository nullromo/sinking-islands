services:
    sinking-islands-redis:
        image: redis:latest
        healthcheck:
            test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
            interval: 1s
            timeout: 3s
            retries: 5
        command: ["redis-server"]
    sinking-islands-backend:
        depends_on:
            sinking-islands-redis:
                condition: service_healthy
        build:
            context: .
            dockerfile: Dockerfile.backend
        ports:
            - "5151:5151"
    sinking-islands-frontend:
        depends_on:
            sinking-islands-redis:
                condition: service_healthy
        build:
            context: .
            dockerfile: Dockerfile.frontend
